<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honorarios Ley 9131</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: #0d1117;
    color: #ddd8cc;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #13192b 0%, #0d1117 100%);
    border-bottom: 1px solid rgba(201,162,39,0.3);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo { font-size: 32px; }
  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #c9a227;
    letter-spacing: 0.3px;
  }
  .header-text p {
    font-size: 11px;
    color: #667788;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .body { max-width: 660px; margin: 0 auto; padding: 20px 16px; }

  /* JUS Panel */
  .jus-panel {
    background: #13192b;
    border: 1px solid rgba(201,162,39,0.25);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .jus-label {
    font-size: 10px;
    color: #667788;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }
  .jus-value {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #c9a227;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .edit-hint { font-size: 13px; color: #667788; transition: color 0.2s; }
  .jus-value:hover .edit-hint { color: #c9a227; }
  #jus-input {
    background: transparent;
    border: 1px solid #c9a227;
    color: #c9a227;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    padding: 4px 10px;
    border-radius: 5px;
    width: 180px;
    display: none;
  }
  .fetch-btn {
    background: transparent;
    border: 1px solid rgba(201,162,39,0.5);
    color: #c9a227;
    padding: 9px 14px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Source Sans 3', sans-serif;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .fetch-btn:hover { background: rgba(201,162,39,0.1); }
  .fetch-btn:disabled { opacity: 0.5; cursor: default; }
  .fetch-status {
    font-size: 11px;
    color: #7aaa7a;
    margin-top: 4px;
    min-height: 16px;
    font-style: italic;
  }

  /* Card */
  .card {
    background: #13192b;
    border: 1px solid #1e2a3a;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 10px;
    color: #c9a227;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 18px;
    font-weight: 700;
  }
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 11px;
    color: #667788;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  select, input[type="text"] {
    width: 100%;
    background: #0d1117;
    border: 1px solid #1e2a3a;
    color: #ddd8cc;
    padding: 11px 13px;
    border-radius: 7px;
    font-size: 14px;
    font-family: 'Source Sans 3', sans-serif;
    transition: border-color 0.2s;
    appearance: auto;
  }
  select:focus, input[type="text"]:focus {
    outline: none;
    border-color: rgba(201,162,39,0.5);
  }

  .inputs-section {
    margin-top: 18px;
    border-top: 1px solid #1e2a3a;
    padding-top: 18px;
  }
  .checks-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .check-label {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    color: #99aaaa;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  input[type="checkbox"] { accent-color: #c9a227; width: 15px; height: 15px; cursor: pointer; }

  .calc-btn {
    width: 100%;
    background: linear-gradient(135deg, #c9a227, #a07d15);
    border: none;
    color: #0d1117;
    padding: 13px;
    border-radius: 7px;
    font-size: 15px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
  }
  .calc-btn:hover { opacity: 0.9; }

  /* Result */
  .result-card {
    background: linear-gradient(135deg, #0f1f18 0%, #0d1117 100%);
    border: 1px solid rgba(74,154,90,0.4);
    border-radius: 10px;
    padding: 24px 20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .result-header {
    font-size: 10px;
    color: #5a8a6a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .result-main {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    color: #7adf9a;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .result-jus {
    font-size: 14px;
    color: #4a8a6a;
    margin-top: 4px;
  }
  .divider { height: 1px; background: #1e3a2a; margin: 16px 0; }
  .detail-line {
    font-size: 13px;
    color: #8aaa90;
    display: flex;
    gap: 8px;
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .detail-icon { color: #7adf9a; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .result-footer {
    margin-top: 16px;
    font-size: 10px;
    color: #3a5a4a;
    border-top: 1px solid #1e3a2a;
    padding-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">⚖</div>
  <div class="header-text">
    <h1>Calculadora de Honorarios</h1>
    <p>Ley Provincial N° 9.131 · Mendoza · Art. 2 y especiales</p>
  </div>
</header>

<div class="body">

  <!-- JUS Panel -->
  <div class="jus-panel">
    <div>
      <div class="jus-label">Valor del JUS</div>
      <div class="jus-value" id="jus-display" onclick="editJus()">
        <span id="jus-text">$ 665.078,59</span>
        <span class="edit-hint">✎</span>
      </div>
      <input type="text" id="jus-input" value="665078.59" onblur="saveJus()" onkeydown="if(event.key==='Enter') saveJus()" />
      <div class="fetch-status" id="fetch-status"></div>
    </div>
    <button class="fetch-btn" id="fetch-btn" onclick="fetchJUS()">⟳ Actualizar JUS</button>
  </div>

  <!-- Selector -->
  <div class="card">
    <div class="section-title">Tipo de proceso</div>

    <div class="field">
      <label>Categoría</label>
      <select id="categoria" onchange="onCategoriaChange()">
        <option value="">Seleccioná una categoría...</option>
        <option value="general">Juicios con Monto (Art. 2)</option>
        <option value="familia">Fuero de Familia (Art. 9 bis)</option>
        <option value="desalojo">Desalojo (Art. 9.e)</option>
        <option value="penal">Penal (Art. 10 bis)</option>
        <option value="extra">Extrajudicial / Otros</option>
      </select>
    </div>

    <div class="field hidden" id="caso-field">
      <label>Proceso</label>
      <select id="caso" onchange="onCasoChange()">
        <option value="">Seleccioná el proceso...</option>
      </select>
    </div>

    <div id="inputs-section" class="inputs-section hidden">
      <div class="field hidden" id="monto-field">
        <label id="monto-label">Monto del juicio ($ pesos)</label>
        <input type="text" id="monto" placeholder="Ej: 5000000" />
      </div>
      <div class="field hidden" id="cuota-field">
        <label id="cuota-label">Cuota mensual ($)</label>
        <input type="text" id="cuota" placeholder="Ej: 150000" />
      </div>
      <div class="checks-row">
        <label class="check-label">
          <input type="checkbox" id="complejidad" />
          +30% causa compleja / mérito jurídico destacado (Art. 2)
        </label>
        <label class="check-label">
          <input type="checkbox" id="perdedor" />
          Parte perdedora — regulación al 70% (Art. 3)
        </label>
      </div>
      <button class="calc-btn" onclick="calcular()">Calcular honorarios</button>
    </div>
  </div>

  <!-- Resultado -->
  <div id="resultado" class="result-card hidden"></div>

</div>

<script>
// Carga el JUS guardado o usa el por defecto si no hay ninguno
let JUS = localStorage.getItem('valorJusPersonalizado') || 665078.59;
JUS = parseFloat(JUS);

// Esta función se activará cada vez que uses el "lápiz" para cambiar el valor
function guardarNuevoJus(nuevoValor) {
    localStorage.setItem('valorJusPersonalizado', nuevoValor);
    JUS = nuevoValor;
}

const CASOS = {
  general: [
    { id:"gen_ord", label:"Juicio ordinario con monto", tipo:"escala", factor:1 },
    { id:"gen_mon", label:"Monitorio sin oposición (Art. 7)", tipo:"escala", factor:0.75 },
    { id:"gen_suc", label:"Sucesión (Art. 8)", tipo:"escala", factor:0.70 },
    { id:"gen_pos", label:"Proceso posesorio (Art. 9.f)", tipo:"escala", factor:0.25 },
    { id:"gen_pre", label:"Prescripción adquisitiva sin oposición (Art. 9.g)", tipo:"escala", factor:0.50 },
    { id:"gen_esc", label:"Escrituración sin oposición (Art. 9.h)", tipo:"escala_escrituracion", factor:0.50 },
    { id:"gen_ape", label:"Recurso de apelación — 2ª instancia (Art. 15)", tipo:"escala", factor:0.50 },
    { id:"gen_rep", label:"Recurso de reposición (Art. 15)", tipo:"escala", factor:0.20 },
    { id:"gen_acl", label:"Recurso de aclaratoria (Art. 15)", tipo:"escala", factor:0.05 },
  ],
  familia: [
    { id:"fam_div", label:"Divorcio / cese unión convivencial sin bienes", tipo:"jus_fijo", jus:3 },
    { id:"fam_nul", label:"Nulidad matrimonial", tipo:"jus_fijo", jus:5 },
    { id:"fam_hog", label:"Atribución hogar conyugal / medidas urgentes sin bienes", tipo:"jus_fijo", jus:3 },
    { id:"fam_vio", label:"Violencia intrafamiliar (medidas de protección)", tipo:"jus_fijo", jus:1 },
    { id:"fam_men", label:"Menores — control legalidad con órgano administrativo", tipo:"jus_fijo", jus:2 },
    { id:"fam_fil", label:"Filiación (acción de estado, Art. 9 bis.j)", tipo:"jus_fijo", jus:2 },
    { id:"fam_ado", label:"Adopción", tipo:"jus_fijo", jus:4 },
    { id:"fam_cui", label:"Cuidado personal", tipo:"jus_fijo", jus:2 },
    { id:"fam_reg", label:"Régimen de comunicación", tipo:"jus_fijo", jus:2 },
    { id:"fam_gua", label:"Guarda", tipo:"jus_fijo", jus:2 },
    { id:"fam_ali", label:"Alimentos / prestación alimentaria (Art. 9 bis.i.4)", tipo:"alimentos" },
    { id:"fam_res", label:"Ejercicio / suspensión / privación resp. parental", tipo:"jus_fijo", jus:3 },
    { id:"fam_tut", label:"Tutela / Curatela", tipo:"jus_fijo", jus:2 },
    { id:"fam_int", label:"Restitución internacional de NNA", tipo:"jus_fijo", jus:5 },
    { id:"fam_nom", label:"Nombre, identidad, capacidad, género (Art. 9 bis.l)", tipo:"jus_fijo", jus:2 },
    { id:"fam_cap", label:"Determinación de capacidad (Art. 9 bis.m)", tipo:"jus_fijo", jus:2 },
    { id:"fam_grv", label:"Autorización gravar bienes incapaces (Art. 9 bis.n)", tipo:"jus_fijo", jus:4 },
    { id:"fam_ntr", label:"Acciones de naturaleza tutelar (Art. 9 bis.o)", tipo:"jus_fijo", jus:2 },
    { id:"fam_dis", label:"Dispensa judicial para contraer matrimonio", tipo:"jus_fijo", jus:1 },
  ],
  desalojo: [
    { id:"des_fal", label:"Desalojo por falta de pago (Art. 9.e)", tipo:"desalojo" },
    { id:"des_otr", label:"Desalojo por otros motivos (Art. 9.e)", tipo:"jus_fijo", jus:5 },
  ],
  penal: [
    { id:"pen_fal", label:"Proceso por faltas (mínimo)", tipo:"jus_fijo", jus:1 },
    { id:"pen_cor", label:"Proceso correccional (mínimo)", tipo:"jus_fijo", jus:3 },
    { id:"pen_cri", label:"Proceso criminal (mínimo)", tipo:"jus_fijo", jus:5 },
    { id:"pen_cit", label:"Instrucción penal — citación directa", tipo:"jus_fijo", jus:2 },
    { id:"pen_for", label:"Instrucción penal — formal", tipo:"jus_fijo", jus:3 },
  ],
  extra: [
    { id:"ext_car", label:"Carta documento / carta notarial", tipo:"jus_fijo", jus:0.5 },
    { id:"ext_med", label:"Audiencia de mediación / conciliación", tipo:"jus_fijo", jus:1 },
    { id:"ext_vec", label:"Conflicto de vecindad (Art. 9 ter)", tipo:"jus_fijo", jus:0.5 },
    { id:"ext_amp", label:"Amparo de urgimiento (Art. 9 quater)", tipo:"jus_fijo", jus:1.5 },
  ]
};

let casoActual = null;

function fmtPesos(n) {
  return new Intl.NumberFormat("es-AR", { style:"currency", currency:"ARS", maximumFractionDigits:0 }).format(n);
}
function fmtJUS(n) {
  return n.toFixed(2).replace(".", ",") + " JUS";
}
function parseMonto(str) {
  return parseFloat((str || "").replace(/\./g, "").replace(",", ".")) || 0;
}

function escalaArt2(montoJUS) {
  if (montoJUS <= 0) return 0;
  if (montoJUS <= 20) return montoJUS * 0.20;
  if (montoJUS <= 50) return Math.max(montoJUS * 0.16, 4); // no < máximo tramo anterior (4 JUS)
  return Math.max(montoJUS * 0.12, 8); // no < máximo tramo anterior (8 JUS)
}

function editJus() {
  document.getElementById("jus-display").style.display = "none";
  const inp = document.getElementById("jus-input");
  inp.style.display = "block";
  inp.focus();
}
function saveJus() {
  const inp = document.getElementById("jus-input");
  const v = parseMonto(inp.value);
  if (v > 10000) {
    JUS = v;
    document.getElementById("jus-text").textContent = fmtPesos(JUS);
  }
  inp.style.display = "none";
  document.getElementById("jus-display").style.display = "flex";
}

async function fetchJUS() {
  const btn = document.getElementById("fetch-btn");
  const status = document.getElementById("fetch-status");
  btn.disabled = true;
  btn.textContent = "Buscando...";
  status.textContent = "Consultando el Colegio de Abogados de Mendoza...";

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{
          role: "user",
          content: "Buscá en el sitio oficial del Colegio de Abogados y Procuradores de Mendoza (cmendoza.org.ar) el valor actual del JUS en pesos argentinos. Si no encontrás ahí, buscá 'valor JUS Mendoza 2025 colegio abogados'. Respondé ÚNICAMENTE con el número sin signo $, sin puntos de miles, con coma decimal si tiene centavos. Ejemplo: 665078.59"
        }]
      })
    });
    const data = await resp.json();
    const texts = (data.content || []).filter(b => b.type === "text").map(b => b.text).join(" ");
    const match = texts.match(/\b(\d{3,7}[.,]?\d{0,2})\b/);
    if (match) {
      const val = parseFloat(match[1].replace(",", "."));
      if (val > 100000) {
        JUS = val;
        document.getElementById("jus-text").textContent = fmtPesos(JUS);
        document.getElementById("jus-input").value = val;
        status.textContent = "✓ JUS actualizado: " + fmtPesos(JUS);
        status.style.color = "#7adf9a";
      } else {
        status.textContent = "No se pudo confirmar el valor. Revisá manualmente en cmendoza.org.ar";
        status.style.color = "#cc9944";
      }
    } else {
      status.textContent = "Sin resultado. Actualizá manualmente.";
      status.style.color = "#cc9944";
    }
  } catch(e) {
    status.textContent = "Error de red. Actualizá manualmente.";
    status.style.color = "#cc6644";
  }
  btn.disabled = false;
  btn.textContent = "⟳ Actualizar JUS";
}

function onCategoriaChange() {
  const cat = document.getElementById("categoria").value;
  const casoField = document.getElementById("caso-field");
  const casoSel = document.getElementById("caso");
  const inputsSection = document.getElementById("inputs-section");
  const resultado = document.getElementById("resultado");
  casoActual = null;
  resultado.classList.add("hidden");
  inputsSection.classList.add("hidden");

  if (!cat) { casoField.classList.add("hidden"); return; }
  
  casoSel.innerHTML = '<option value="">Seleccioná el proceso...</option>';
  (CASOS[cat] || []).forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.label;
    casoSel.appendChild(opt);
  });
  casoField.classList.remove("hidden");
}

function onCasoChange() {
  const cat = document.getElementById("categoria").value;
  const id = document.getElementById("caso").value;
  const inputsSection = document.getElementById("inputs-section");
  const resultado = document.getElementById("resultado");
  resultado.classList.add("hidden");

  if (!id) { inputsSection.classList.add("hidden"); casoActual = null; return; }
  
  casoActual = (CASOS[cat] || []).find(c => c.id === id);
  if (!casoActual) return;

  // Show/hide fields
  const montoField = document.getElementById("monto-field");
  const cuotaField = document.getElementById("cuota-field");
  const montoLabel = document.getElementById("monto-label");
  const cuotaLabel = document.getElementById("cuota-label");
  document.getElementById("monto").value = "";
  document.getElementById("cuota").value = "";

  montoField.classList.add("hidden");
  cuotaField.classList.add("hidden");

  if (casoActual.tipo === "escala" || casoActual.tipo === "escala_escrituracion") {
    montoLabel.textContent = "Monto del juicio ($ pesos)";
    montoField.classList.remove("hidden");
  } else if (casoActual.tipo === "alimentos") {
    cuotaLabel.textContent = "Cuota alimentaria mensual ($ pesos)";
    cuotaField.classList.remove("hidden");
  } else if (casoActual.tipo === "desalojo") {
    montoLabel.textContent = "Monto adeudado (opcional)";
    cuotaLabel.textContent = "Alquiler mensual (para calcular 2 años)";
    montoField.classList.remove("hidden");
    cuotaField.classList.remove("hidden");
  }

  inputsSection.classList.remove("hidden");
}

function calcular() {
  if (!casoActual) return;

  let honorariosJUS = 0;
  let detalles = [];
  const montoNum = parseMonto(document.getElementById("monto").value);
  const cuotaNum = parseMonto(document.getElementById("cuota").value);

  if (casoActual.tipo === "jus_fijo") {
    honorariosJUS = casoActual.jus;
    detalles.push(`Mínimo legal fijado por ley: ${fmtJUS(honorariosJUS)}`);
  }
  else if (casoActual.tipo === "escala") {
    if (!montoNum) { alert("Ingresá el monto del juicio."); return; }
    const montoJUS = montoNum / JUS;
    const tasaAplicada = montoJUS <= 20 ? "20%" : montoJUS <= 50 ? "16%" : "12%";
    const baseJUS = escalaArt2(montoJUS);
    honorariosJUS = baseJUS * casoActual.factor;
    detalles.push(`Monto: ${fmtPesos(montoNum)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`Escala Art. 2 (${tasaAplicada} del monto): ${fmtJUS(baseJUS)}`);
    if (casoActual.factor < 1) {
      detalles.push(`Factor ${casoActual.label.split("(")[0].trim()}: × ${(casoActual.factor*100).toFixed(0)}% = ${fmtJUS(honorariosJUS)}`);
    }
  }
  else if (casoActual.tipo === "escala_escrituracion") {
    if (!montoNum) { alert("Ingresá el monto del juicio."); return; }
    const montoJUS = montoNum / JUS;
    const baseJUS = escalaArt2(montoJUS);
    const calculado = baseJUS * 0.5;
    honorariosJUS = Math.max(5, Math.min(50, calculado));
    detalles.push(`Monto: ${fmtPesos(montoNum)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`50% de Art. 2: ${fmtJUS(calculado)}`);
    detalles.push(`Límite legal (entre 5 y 50 JUS) → ${fmtJUS(honorariosJUS)}`);
  }
  else if (casoActual.tipo === "alimentos") {
    if (!cuotaNum) { alert("Ingresá la cuota mensual."); return; }
    const base = cuotaNum * 24;
    const montoJUS = base / JUS;
    const tasaAplicada = montoJUS <= 20 ? "20%" : montoJUS <= 50 ? "16%" : "12%";
    honorariosJUS = escalaArt2(montoJUS);
    detalles.push(`Cuota mensual: ${fmtPesos(cuotaNum)}`);
    detalles.push(`Base 2 años (24 cuotas): ${fmtPesos(base)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`Art. 2 sobre base (${tasaAplicada}): ${fmtJUS(honorariosJUS)}`);
  }
  else if (casoActual.tipo === "desalojo") {
    if (!montoNum && !cuotaNum) { alert("Ingresá el monto adeudado o el alquiler mensual."); return; }
    const dosAnios = cuotaNum * 24;
    const base = Math.max(montoNum, dosAnios);
    const montoJUS = base / JUS;
    const tasaAplicada = montoJUS <= 20 ? "20%" : montoJUS <= 50 ? "16%" : "12%";
    honorariosJUS = escalaArt2(montoJUS);
    if (cuotaNum) detalles.push(`2 años de alquiler: ${fmtPesos(dosAnios)}`);
    if (montoNum) detalles.push(`Monto adeudado: ${fmtPesos(montoNum)}`);
    detalles.push(`Base regulatoria (mayor valor): ${fmtPesos(base)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`Art. 2 (${tasaAplicada}): ${fmtJUS(honorariosJUS)}`);
  }

  if (document.getElementById("complejidad").checked && honorariosJUS > 0) {
    const anterior = honorariosJUS;
    honorariosJUS = honorariosJUS * 1.30;
    detalles.push(`+30% por complejidad / mérito jurídico (Art. 2): ${fmtJUS(honorariosJUS)}`);
  }

  let finalJUS = honorariosJUS;
  if (document.getElementById("perdedor").checked) {
    finalJUS = honorariosJUS * 0.70;
    detalles.push(`Parte perdedora — 70% del honorario ganador (Art. 3): ${fmtJUS(finalJUS)}`);
  }

  const finalPesos = finalJUS * JUS;

  // Render resultado
  const div = document.getElementById("resultado");
  div.innerHTML = `
    <div class="result-header">Honorario mínimo legal</div>
    <div class="result-main">${fmtPesos(finalPesos)}</div>
    <div class="result-jus">${fmtJUS(finalJUS)}</div>
    <div class="divider"></div>
    <div id="detalles-list">
      ${detalles.map(d => `<div class="detail-line"><span class="detail-icon">›</span>${d}</div>`).join("")}
    </div>
    <div class="result-footer">Ley 9.131 Mendoza · JUS vigente: ${fmtPesos(JUS)}</div>
  `;
  div.classList.remove("hidden");
}// --- FUNCIÓN PARA EL LÁPIZ Y MEMORIA ---
const jusValue = document.querySelector('.jus-value');
if (jusValue) {
    jusValue.onclick = () => {
        const nuevo = prompt("Ingrese el nuevo valor del JUS:", JUS);
        if (nuevo && !isNaN(nuevo)) {
            const valorNumerico = parseFloat(nuevo);
            // Guarda en la memoria del celular
            localStorage.setItem('valorJusPersonalizado', valorNumerico);
            JUS = valorNumerico;
            // Actualiza los textos en pantalla
            document.querySelectorAll('.jus-vigente-display').forEach(el => {
                el.innerText = fmtPesos(JUS);
            });
            alert("JUS actualizado y guardado.");
            // Si hay un cálculo hecho, lo refresca
            if (casoActual) calcularHonorarios();
        }
    };
}
</script>
