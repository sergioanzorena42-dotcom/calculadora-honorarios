<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honorarios · Ley 9.131 · Mendoza</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3437/3437364.png">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3437/3437364.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:    #f7f4ef;
    --cream2:   #efe9df;
    --navy:     #1a2740;
    --navy2:    #243354;
    --gold:     #9a7b2f;
    --gold-lt:  #c9a84c;
    --text:     #2c3a4a;
    --muted:    #7a8898;
    --border:   #d8cfc4;
    --green:    #2e6b4a;
    --green-lt: #e8f5ee;
    --radius:   10px;
    --shadow:   0 2px 16px rgba(26,39,64,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 64px;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-emblem {
    width: 38px; height: 38px;
    border: 1.5px solid var(--gold-lt);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--gold-lt); flex-shrink: 0;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600;
    color: #fff; letter-spacing: 0.2px;
  }
  .header-sub {
    font-size: 10px; color: rgba(255,255,255,0.45);
    text-transform: uppercase; letter-spacing: 1.8px; margin-top: 1px;
  }
  .header-badge {
    font-size: 10px; color: var(--gold-lt);
    border: 1px solid rgba(201,168,76,0.35);
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* ── LAYOUT ── */
  .page { max-width: 640px; margin: 0 auto; padding: 20px 14px 40px; }

  /* ── JUS PANEL ── */
  .jus-panel {
    background: var(--navy);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .jus-left {}
  .jus-label {
    font-size: 9px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px;
  }
  .jus-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 700;
    color: var(--gold-lt);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: opacity 0.15s;
  }
  .jus-display:hover { opacity: 0.85; }
  .edit-hint { font-size: 14px; color: rgba(201,168,76,0.5); }
  #jus-input {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700;
    background: transparent;
    border: 1px solid var(--gold-lt);
    color: var(--gold-lt);
    padding: 3px 10px; border-radius: 6px;
    width: 185px; display: none;
  }
  .jus-note {
    font-size: 10px; color: rgba(255,255,255,0.3);
    margin-top: 4px; line-height: 1.4;
  }
  .jus-link {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-lt);
    padding: 9px 14px; border-radius: 7px;
    font-size: 11px; font-family: 'DM Sans', sans-serif;
    text-decoration: none; white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0; display: inline-block;
  }
  .jus-link:hover { background: rgba(201,168,76,0.1); }

  /* ── CARD ── */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 600;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--cream2);
  }

  /* ── FORM ── */
  .field { margin-bottom: 14px; }
  .field-label {
    display: block;
    font-size: 11px; font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .field-label.accent { color: var(--gold); }

  select, input[type="text"] {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 13px;
    border-radius: 7px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: auto;
  }
  select:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(154,123,47,0.10);
    background: #fff;
  }
  .input-gold input[type="text"] {
    border-color: rgba(154,123,47,0.4);
    background: #fff;
  }

  /* ── INFO BOX ── */
  .info-box {
    background: #f0f5ff;
    border-left: 3px solid var(--navy2);
    border-radius: 0 7px 7px 0;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 12.5px;
    color: var(--navy2);
    line-height: 1.55;
  }
  .info-box strong { color: var(--navy); }

  /* ── SEPARATOR ── */
  .sep { height: 1px; background: var(--cream2); margin: 16px 0; }

  /* ── CHECKS ── */
  .checks { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: var(--text); cursor: pointer;
    text-transform: none; letter-spacing: 0; line-height: 1.4;
  }
  .check-item input[type="checkbox"] {
    accent-color: var(--navy);
    width: 15px; height: 15px;
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
  }

  /* ── BTN ── */
  .btn-calc {
    width: 100%;
    background: var(--navy);
    border: none;
    color: #fff;
    padding: 14px;
    border-radius: 7px;
    font-size: 15px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-calc:hover { background: var(--navy2); }

  /* ── RESULTADO ── */
  .result-card {
    background: var(--green-lt);
    border: 1px solid rgba(46,107,74,0.25);
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: var(--shadow);
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-label {
    font-size: 9px; color: var(--green);
    text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 6px;
  }
  .result-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 700;
    color: var(--green);
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .result-jus {
    font-size: 14px; color: rgba(46,107,74,0.7);
    margin-top: 5px;
  }
  .result-sep { height: 1px; background: rgba(46,107,74,0.15); margin: 14px 0; }
  .detail {
    display: flex; gap: 9px; align-items: flex-start;
    font-size: 13px; color: #3a5a45;
    margin-bottom: 6px; line-height: 1.4;
  }
  .detail-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); flex-shrink: 0; margin-top: 5px;
  }
  .result-foot {
    margin-top: 14px; padding-top: 10px;
    border-top: 1px solid rgba(46,107,74,0.15);
    font-size: 10px; color: rgba(46,107,74,0.5);
    text-transform: uppercase; letter-spacing: 0.8px;
  }

  .hidden { display: none !important; }

  /* Mobile */
  @media (max-width: 480px) {
    .header-badge { display: none; }
    .result-amount { font-size: 34px; }
    .jus-display { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-emblem">⚖</div>
    <div>
      <div class="header-title">Honorarios Profesionales</div>
      <div class="header-sub">Ley Provincial N° 9.131 · Mendoza</div>
    </div>
  </div>
  <div class="header-badge">Art. 2 y especiales</div>
</header>

<div class="page">

  <!-- JUS Panel -->
  <div class="jus-panel">
    <div class="jus-left">
      <div class="jus-label">Valor del JUS · Honorarios</div>
      <div class="jus-display" id="jus-display" onclick="editJus()">
        <span id="jus-text">$ 665.078,59</span>
        <span class="edit-hint">✎</span>
      </div>
      <input type="text" id="jus-input" value="665078.59"
             onblur="saveJus()" onkeydown="if(event.key==='Enter') saveJus()" />
      <div class="jus-note">Vigente 20/03/2026 · Tocá el valor para editar</div>
    </div>
    <a class="jus-link" href="https://jusmendoza.gob.ar/tasas-judiciales/" target="_blank">
      Ver JUS oficial ↗
    </a>
  </div>

  <!-- Calculadora -->
  <div class="card">
    <div class="card-title">Tipo de proceso</div>

    <div class="field">
      <label class="field-label">Categoría</label>
      <select id="categoria" onchange="onCategoriaChange()">
        <option value="">Seleccioná una categoría...</option>
        <option value="general">Juicios con monto — escala Art. 2</option>
        <option value="familia">Fuero de Familia — Art. 9 bis</option>
        <option value="desalojo">Desalojo — Art. 9.e</option>
        <option value="penal">Penal — Art. 10 bis</option>
        <option value="extra">Extrajudicial / Otros</option>
      </select>
    </div>

    <div class="field hidden" id="caso-field">
      <label class="field-label">Proceso específico</label>
      <select id="caso" onchange="onCasoChange()"></select>
    </div>

    <div id="info-box-wrap" class="hidden">
      <div class="info-box" id="info-box"></div>
    </div>

    <div id="inputs-section" class="hidden">
      <div class="sep"></div>

      <div class="field input-gold hidden" id="monto-field">
        <label class="field-label accent" id="monto-label">Monto del objeto / valor de lo reclamado ($)</label>
        <input type="text" id="monto" placeholder="Ej: 5.000.000" oninput="formatInput(this)" />
      </div>

      <div class="field hidden" id="cuota-field">
        <label class="field-label" id="cuota-label">Cuota alimentaria mensual ($)</label>
        <input type="text" id="cuota" placeholder="Ej: 150.000" oninput="formatInput(this)" />
      </div>

      <div class="sep"></div>

      <div class="checks">
        <label class="check-item">
          <input type="checkbox" id="complejidad" />
          +30% — causa compleja o mérito jurídico destacado (Art. 2 in fine)
        </label>
        <label class="check-item">
          <input type="checkbox" id="perdedor" />
          Parte perdedora — regular al 70% del honorario del ganador (Art. 3)
        </label>
      </div>

      <button class="btn-calc" onclick="calcular()">Calcular honorarios mínimos</button>
    </div>
  </div>

  <!-- Resultado -->
  <div id="resultado" class="result-card hidden"></div>

</div>

<script>
// ─────────────────────────────────────────────
//  VALOR JUS — Fuente: jusmendoza.gob.ar
//  Actualizar cuando cambie. Vigente 20/03/2026
// ─────────────────────────────────────────────
let JUS = 665078.59;

// ─────────────────────────────────────────────
//  TABLA DE PROCESOS
// ─────────────────────────────────────────────
const CASOS = {
  general: [
    { id:"gen_ord", label:"Juicio ordinario con monto (Art. 2)", tipo:"escala", factor:1,
      info:"Escala completa Art. 2. Ingresá el valor total reclamado en la demanda." },
    { id:"gen_suc", label:"Sucesión — patrimonio transmitido (Art. 8)", tipo:"escala", factor:0.70,
      info:"<strong>Base:</strong> valor total del patrimonio transmitido, incluidos bienes gananciales y bienes en otras jurisdicciones. Se aplica el <strong>70%</strong> de la escala Art. 2 (reducción del 30%)." },
    { id:"gen_mon", label:"Monitorio sin oposición (Art. 7)", tipo:"escala", factor:0.75,
      info:"75% de la escala Art. 2 (reducción del 25% por ausencia de oposición)." },
    { id:"gen_pos", label:"Proceso posesorio (Art. 9.f)", tipo:"escala", factor:0.25,
      info:"25% de la escala Art. 2 sobre el valor del bien objeto del juicio." },
    { id:"gen_pre", label:"Prescripción adquisitiva sin oposición (Art. 9.g)", tipo:"escala", factor:0.50,
      info:"50% de la escala Art. 2. Con oposición: escala completa sin reducción." },
    { id:"gen_esc", label:"Escrituración sin oposición (Art. 9.h)", tipo:"escala_escrituracion", factor:0.50,
      info:"50% de la escala Art. 2. <strong>Mínimo 5 JUS, máximo 50 JUS.</strong> Con oposición: sin reducción." },
    { id:"gen_ape", label:"Apelación — 2ª instancia (Art. 15)", tipo:"escala", factor:0.50,
      info:"50% de la escala. Si se revoca totalmente a favor del apelante: 75%." },
    { id:"gen_rep", label:"Recurso de reposición (Art. 15)", tipo:"escala", factor:0.20,
      info:"20% de la escala Art. 2, en cualquier instancia." },
    { id:"gen_acl", label:"Recurso de aclaratoria (Art. 15)", tipo:"escala", factor:0.05,
      info:"5% de la escala Art. 2." },
    { id:"gen_exp", label:"Expropiación directa (Art. 25)", tipo:"escala", factor:1,
      info:"Escala completa Art. 2 sobre el valor del bien expropiado." },
  ],
  familia: [
    { id:"fam_ali", label:"Alimentos / prestación alimentaria (Art. 9 bis.i.4)", tipo:"alimentos",
      info:"<strong>Base:</strong> monto de los alimentos de <strong>2 años</strong> (24 cuotas). Ingresá la cuota mensual acordada o reclamada. Se aplica la escala Art. 2 sobre esa base." },
    { id:"fam_div", label:"Divorcio / cese unión convivencial sin bienes", tipo:"jus_fijo", jus:3,
      info:"Mínimo legal: 3 JUS." },
    { id:"fam_nul", label:"Nulidad matrimonial", tipo:"jus_fijo", jus:5,
      info:"Mínimo: 5 JUS." },
    { id:"fam_hog", label:"Atribución hogar conyugal / medidas urgentes sin bienes", tipo:"jus_fijo", jus:3,
      info:"Mínimo: 3 JUS." },
    { id:"fam_vio", label:"Violencia intrafamiliar — medidas de protección", tipo:"jus_fijo", jus:1,
      info:"Mínimo: 1 JUS." },
    { id:"fam_men", label:"Control legalidad — NNA con órgano administrativo", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_fil", label:"Filiación — acciones de estado (Art. 9 bis.j)", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_ado", label:"Adopción", tipo:"jus_fijo", jus:4,
      info:"Mínimo: 4 JUS." },
    { id:"fam_cui", label:"Cuidado personal", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_reg", label:"Régimen de comunicación", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_gua", label:"Guarda", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_res", label:"Ejercicio / suspensión / privación resp. parental", tipo:"jus_fijo", jus:3,
      info:"Mínimo: 3 JUS." },
    { id:"fam_tut", label:"Tutela / Curatela", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_int", label:"Restitución internacional de NNA", tipo:"jus_fijo", jus:5,
      info:"Mínimo: 5 JUS." },
    { id:"fam_nom", label:"Nombre, identidad, capacidad, género (Art. 9 bis.l)", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_cap", label:"Determinación de capacidad (Art. 9 bis.m)", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_grv", label:"Autorización gravar bienes incapaces (Art. 9 bis.n)", tipo:"jus_fijo", jus:4,
      info:"Mínimo: 4 JUS." },
    { id:"fam_ttr", label:"Acciones de naturaleza tutelar (Art. 9 bis.o)", tipo:"jus_fijo", jus:2,
      info:"Mínimo: 2 JUS." },
    { id:"fam_dis", label:"Dispensa judicial para contraer matrimonio", tipo:"jus_fijo", jus:1,
      info:"Mínimo: 1 JUS." },
  ],
  desalojo: [
    { id:"des_fal", label:"Desalojo por falta de pago (Art. 9.e)", tipo:"desalojo",
      info:"<strong>Base:</strong> 2 años de alquiler o monto adeudado al momento de la sentencia, el que sea <strong>mayor</strong>. Podés ingresar ambos y la app toma el mayor automáticamente." },
    { id:"des_otr", label:"Desalojo por otros motivos (Art. 9.e)", tipo:"jus_fijo", jus:5,
      info:"Mínimo fijo: 5 JUS." },
  ],
  penal: [
    { id:"pen_fal", label:"Proceso por faltas (mínimo)", tipo:"jus_fijo", jus:1, info:"Mínimo: 1 JUS." },
    { id:"pen_cor", label:"Proceso correccional (mínimo)", tipo:"jus_fijo", jus:3, info:"Mínimo: 3 JUS." },
    { id:"pen_cri", label:"Proceso criminal (mínimo)", tipo:"jus_fijo", jus:5, info:"Mínimo: 5 JUS." },
    { id:"pen_cit", label:"Instrucción penal — citación directa", tipo:"jus_fijo", jus:2, info:"Mínimo: 2 JUS." },
    { id:"pen_for", label:"Instrucción penal — formal", tipo:"jus_fijo", jus:3, info:"Mínimo: 3 JUS." },
  ],
  extra: [
    { id:"ext_car", label:"Carta documento / gestión extrajudicial", tipo:"jus_fijo", jus:0.5,
      info:"Mínimo sugerido: 0,5 JUS." },
    { id:"ext_med", label:"Audiencia de mediación / conciliación", tipo:"jus_fijo", jus:1,
      info:"Mínimo: 1 JUS." },
    { id:"ext_vec", label:"Conflicto de vecindad (Art. 9 ter)", tipo:"jus_fijo", jus:0.5,
      info:"Mínimo: 0,5 JUS." },
    { id:"ext_amp", label:"Amparo de urgimiento (Art. 9 quater)", tipo:"jus_fijo", jus:1.5,
      info:"Mínimo: 1,5 JUS." },
  ]
};

let casoActual = null;

// ─── UTILIDADES ───────────────────────────────
function fmtPesos(n) {
  return new Intl.NumberFormat("es-AR", {
    style:"currency", currency:"ARS", maximumFractionDigits:0
  }).format(n);
}
function fmtJUS(n) { return n.toFixed(2).replace(".", ",") + " JUS"; }
function parseMonto(str) {
  return parseFloat((str || "").replace(/\./g,"").replace(",",".")) || 0;
}
function formatInput(el) {
  let v = el.value.replace(/[^\d]/g,"");
  if (v) el.value = new Intl.NumberFormat("es-AR").format(parseInt(v));
}

// ─── ESCALA ART. 2 ────────────────────────────
// Incluye regla del máximo del grado precedente
function escalaArt2(montoJUS) {
  if (montoJUS <= 0) return 0;
  const max20 = 20 * 0.20; // 4 JUS
  const max50 = 50 * 0.16; // 8 JUS
  if (montoJUS <= 20) return montoJUS * 0.20;
  if (montoJUS <= 50) return Math.max(montoJUS * 0.16, max20);
  return Math.max(montoJUS * 0.12, max50);
}

// ─── EDICIÓN MANUAL DEL JUS ───────────────────
function editJus() {
  document.getElementById("jus-display").style.display = "none";
  const inp = document.getElementById("jus-input");
  inp.style.display = "block";
  inp.focus();
}
function saveJus() {
  const inp = document.getElementById("jus-input");
  const v = parseFloat(inp.value.replace(/\./g,"").replace(",","."));
  if (v > 10000) {
    JUS = v;
    document.getElementById("jus-text").textContent = fmtPesos(JUS);
  }
  inp.style.display = "none";
  document.getElementById("jus-display").style.display = "flex";
}

// ─── INTERFAZ ─────────────────────────────────
function onCategoriaChange() {
  const cat = document.getElementById("categoria").value;
  const casoSel = document.getElementById("caso");
  ["caso-field","info-box-wrap","inputs-section","resultado"].forEach(id =>
    document.getElementById(id).classList.add("hidden")
  );
  casoActual = null;
  if (!cat) return;
  casoSel.innerHTML = '<option value="">Seleccioná el proceso...</option>';
  (CASOS[cat] || []).forEach(c => {
    const o = document.createElement("option");
    o.value = c.id; o.textContent = c.label;
    casoSel.appendChild(o);
  });
  document.getElementById("caso-field").classList.remove("hidden");
}

function onCasoChange() {
  const cat = document.getElementById("categoria").value;
  const id  = document.getElementById("caso").value;
  ["info-box-wrap","inputs-section","resultado"].forEach(el =>
    document.getElementById(el).classList.add("hidden")
  );
  if (!id) { casoActual = null; return; }
  casoActual = (CASOS[cat] || []).find(c => c.id === id);
  if (!casoActual) return;

  // Info box
  if (casoActual.info) {
    document.getElementById("info-box").innerHTML = casoActual.info;
    document.getElementById("info-box-wrap").classList.remove("hidden");
  }

  // Campos de entrada
  const montoField = document.getElementById("monto-field");
  const cuotaField = document.getElementById("cuota-field");
  document.getElementById("monto").value = "";
  document.getElementById("cuota").value = "";
  montoField.classList.add("hidden");
  cuotaField.classList.add("hidden");

  const t = casoActual.tipo;
  if (t === "escala" || t === "escala_escrituracion") {
    document.getElementById("monto-label").textContent =
      casoActual.id === "gen_suc"
        ? "Valor del patrimonio transmitido ($)"
        : "Monto del objeto / valor de lo reclamado ($)";
    montoField.classList.remove("hidden");
  } else if (t === "alimentos") {
    cuotaField.classList.remove("hidden");
  } else if (t === "desalojo") {
    document.getElementById("monto-label").textContent = "Monto adeudado al momento de la sentencia ($)";
    document.getElementById("cuota-label").textContent = "Alquiler mensual ($)";
    montoField.classList.remove("hidden");
    cuotaField.classList.remove("hidden");
  }
  // jus_fijo: sin campos

  document.getElementById("inputs-section").classList.remove("hidden");
}

// ─── CÁLCULO ──────────────────────────────────
function calcular() {
  if (!casoActual) return;
  const montoNum = parseMonto(document.getElementById("monto").value);
  const cuotaNum = parseMonto(document.getElementById("cuota").value);
  let honorariosJUS = 0;
  const detalles = [];
  const t = casoActual.tipo;

  if (t === "jus_fijo") {
    honorariosJUS = casoActual.jus;
    detalles.push(`Mínimo legal fijado por ley: ${fmtJUS(honorariosJUS)}`);
  }
  else if (t === "escala") {
    if (!montoNum) { alert("Ingresá el monto del objeto."); return; }
    const montoJUS = montoNum / JUS;
    const tasa = montoJUS <= 20 ? "20%" : montoJUS <= 50 ? "16%" : "12%";
    const baseJUS = escalaArt2(montoJUS);
    honorariosJUS = baseJUS * casoActual.factor;
    detalles.push(`Monto: ${fmtPesos(montoNum)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`Escala Art. 2 (${tasa}): ${fmtJUS(baseJUS)}`);
    if (casoActual.factor < 1)
      detalles.push(`Factor de reducción (${(casoActual.factor*100).toFixed(0)}%): ${fmtJUS(honorariosJUS)}`);
  }
  else if (t === "escala_escrituracion") {
    if (!montoNum) { alert("Ingresá el valor del bien."); return; }
    const montoJUS = montoNum / JUS;
    const base = escalaArt2(montoJUS);
    const calc  = base * 0.50;
    honorariosJUS = Math.max(5, Math.min(50, calc));
    detalles.push(`Valor del bien: ${fmtPesos(montoNum)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`50% de escala Art. 2: ${fmtJUS(calc)}`);
    if (honorariosJUS !== calc)
      detalles.push(`Ajuste por límites legales (5–50 JUS): ${fmtJUS(honorariosJUS)}`);
  }
  else if (t === "alimentos") {
    if (!cuotaNum) { alert("Ingresá la cuota mensual."); return; }
    const base = cuotaNum * 24;
    const montoJUS = base / JUS;
    const tasa = montoJUS <= 20 ? "20%" : montoJUS <= 50 ? "16%" : "12%";
    honorariosJUS = escalaArt2(montoJUS);
    detalles.push(`Cuota mensual: ${fmtPesos(cuotaNum)}`);
    detalles.push(`Base 24 cuotas (2 años): ${fmtPesos(base)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`Escala Art. 2 (${tasa}): ${fmtJUS(honorariosJUS)}`);
  }
  else if (t === "desalojo") {
    if (!montoNum && !cuotaNum) { alert("Ingresá el alquiler mensual o el monto adeudado."); return; }
    const dosAnios = cuotaNum * 24;
    const base = Math.max(montoNum, dosAnios);
    const montoJUS = base / JUS;
    const tasa = montoJUS <= 20 ? "20%" : montoJUS <= 50 ? "16%" : "12%";
    honorariosJUS = escalaArt2(montoJUS);
    if (cuotaNum) detalles.push(`2 años de alquiler: ${fmtPesos(dosAnios)}`);
    if (montoNum) detalles.push(`Monto adeudado: ${fmtPesos(montoNum)}`);
    detalles.push(`Base regulatoria (mayor valor): ${fmtPesos(base)} = ${fmtJUS(montoJUS)}`);
    detalles.push(`Escala Art. 2 (${tasa}): ${fmtJUS(honorariosJUS)}`);
  }

  // Modificadores
  if (document.getElementById("complejidad").checked) {
    honorariosJUS *= 1.30;
    detalles.push(`+30% por complejidad / mérito jurídico (Art. 2): ${fmtJUS(honorariosJUS)}`);
  }
  let finalJUS = honorariosJUS;
  if (document.getElementById("perdedor").checked) {
    finalJUS *= 0.70;
    detalles.push(`Parte perdedora — 70% del regulado (Art. 3): ${fmtJUS(finalJUS)}`);
  }

  const finalPesos = finalJUS * JUS;

  const div = document.getElementById("resultado");
  div.innerHTML = `
    <div class="result-label">Honorario mínimo legal</div>
    <div class="result-amount">${fmtPesos(finalPesos)}</div>
    <div class="result-jus">${fmtJUS(finalJUS)}</div>
    <div class="result-sep"></div>
    ${detalles.map(d => `
      <div class="detail">
        <span class="detail-dot"></span>
        <span>${d}</span>
      </div>`).join("")}
    <div class="result-foot">
      Ley 9.131 · Mendoza · JUS: ${fmtPesos(JUS)} · Vigente 20/03/2026
    </div>
  `;
  div.classList.remove("hidden");
  div.scrollIntoView({ behavior:"smooth", block:"nearest" });
}
</script>
