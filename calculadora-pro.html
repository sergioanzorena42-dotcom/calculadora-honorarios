<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honorarios · Dr. Sergio Anzorena · Mendoza</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3437/3437364.png">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3437/3437364.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:    #f7f4ef;
    --cream2:   #efe9df;
    --navy:     #1a2740;
    --navy2:    #243354;
    --gold:     #9a7b2f;
    --gold-lt:  #c9a84c;
    --text:     #2c3a4a;
    --muted:    #7a8898;
    --border:   #d8cfc4;
    --green:    #2e6b4a;
    --green-lt: #e8f5ee;
    --radius:   10px;
    --shadow:   0 2px 16px rgba(26,39,64,0.08);
    --whatsapp: #25d366;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 64px;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-emblem {
    width: 38px; height: 38px;
    border: 1.5px solid var(--gold-lt);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--gold-lt); flex-shrink: 0;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600;
    color: #fff; letter-spacing: 0.2px;
  }
  .header-sub {
    font-size: 10px; color: rgba(255,255,255,0.45);
    text-transform: uppercase; letter-spacing: 1.8px; margin-top: 1px;
  }
  .header-badge {
    font-size: 10px; color: var(--gold-lt);
    border: 1px solid rgba(201,168,76,0.35);
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* ── LAYOUT ── */
  .page { max-width: 640px; margin: 0 auto; padding: 20px 14px 40px; }

  /* ── JUS PANEL ── */
  .jus-panel {
    background: var(--navy);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .jus-label {
    font-size: 9px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px;
  }
  .jus-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 700;
    color: var(--gold-lt);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: opacity 0.15s;
  }
  #jus-input {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700;
    background: transparent;
    border: 1px solid var(--gold-lt);
    color: var(--gold-lt);
    padding: 3px 10px; border-radius: 6px;
    width: 185px; display: none;
  }
  .jus-note {
    font-size: 10px; color: rgba(255,255,255,0.3);
    margin-top: 4px; line-height: 1.4;
  }
  .jus-link {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-lt);
    padding: 9px 14px; border-radius: 7px;
    font-size: 11px; font-family: 'DM Sans', sans-serif;
    text-decoration: none; white-space: nowrap;
    transition: background 0.2s;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 600;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--cream2);
  }

  /* ── FORM ── */
  .field { margin-bottom: 14px; }
  .field-label {
    display: block;
    font-size: 11px; font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  select, input[type="text"] {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 13px;
    border-radius: 7px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── BOTONES ── */
  .btn-calc {
    width: 100%;
    background: var(--navy);
    border: none;
    color: #fff;
    padding: 14px;
    border-radius: 7px;
    font-size: 15px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
  }

  /* BOTÓN WHATSAPP PRO */
  .btn-ws-pro {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: var(--whatsapp);
    color: #fff;
    text-decoration: none;
    padding: 15px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-top: 20px;
    box-shadow: 0 4px 12px rgba(37, 211, 102, 0.25);
    transition: transform 0.2s;
  }
  .btn-ws-pro:active { transform: scale(0.98); }
  .btn-ws-pro img { width: 20px; filter: brightness(0) invert(1); }

  /* ── RESULTADO ── */
  .result-card {
    background: var(--green-lt);
    border: 1px solid rgba(46,107,74,0.25);
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: var(--shadow);
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .result-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 700;
    color: var(--green);
    line-height: 1;
  }

  .footer-sig {
    text-align: center;
    margin-top: 30px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .hidden { display: none !important; }
  .info-box { background: #f0f5ff; border-left: 3px solid var(--navy2); padding: 10px 14px; font-size: 12.5px; }
  .sep { height: 1px; background: var(--cream2); margin: 16px 0; }
  .checks { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .check-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-emblem">⚖</div>
    <div>
      <div class="header-title">Herramienta Legal Pro</div>
      <div class="header-sub">Dr. Sergio Anzorena · Mendoza</div>
    </div>
  </div>
  <div class="header-badge">Ley 9.131</div>
</header>

<div class="page">
  <div class="jus-panel">
    <div class="jus-left">
      <div class="jus-label">Valor del JUS</div>
      <div class="jus-display" id="jus-display" onclick="editJus()">
        <span id="jus-text">$ 665.078,59</span> <span style="font-size:14px; opacity:0.5">✎</span>
      </div>
      <input type="text" id="jus-input" value="665078.59" onblur="saveJus()" onkeydown="if(event.key==='Enter') saveJus()" />
      <div class="jus-note">Actualizable manualmente tocando el valor</div>
    </div>
    <a class="jus-link" href="https://jusmendoza.gob.ar/tasas-judiciales/" target="_blank">JUS Oficial ↗</a>
  </div>

  <div class="card">
    <div class="card-title">Configuración del Caso</div>
    <div class="field">
      <label class="field-label">Categoría Jurídica</label>
      <select id="categoria" onchange="onCategoriaChange()">
        <option value="">Seleccioná...</option>
        <option value="general">Juicios con monto (Art. 2)</option>
        <option value="familia">Derecho de Familia (Art. 9 bis)</option>
        <option value="desalojo">Desalojos (Art. 9.e)</option>
        <option value="penal">Fuero Penal (Art. 10 bis)</option>
        <option value="extra">Extrajudicial / Otros</option>
      </select>
    </div>

    <div class="field hidden" id="caso-field">
      <label class="field-label">Proceso específico</label>
      <select id="caso" onchange="onCasoChange()"></select>
    </div>

    <div id="inputs-section" class="hidden">
      <div class="sep"></div>
      <div class="field hidden" id="monto-field">
        <label class="field-label" id="monto-label">Base Económica ($)</label>
        <input type="text" id="monto" placeholder="Ej: 5.000.000" oninput="formatInput(this)" />
      </div>
      <div class="field hidden" id="cuota-field">
        <label class="field-label" id="cuota-label">Cuota mensual ($)</label>
        <input type="text" id="cuota" placeholder="Ej: 150.000" oninput="formatInput(this)" />
      </div>

      <div class="checks">
        <label class="check-item"><input type="checkbox" id="complejidad" /> +30% Complejidad (Art. 2)</label>
        <label class="check-item"><input type="checkbox" id="perdedor" /> Parte perdedora (70%)</label>
      </div>

      <button class="btn-calc" onclick="calcular()">Calcular Honorarios Mínimos</button>
    </div>
  </div>

  <div id="resultado-container" class="hidden">
    <div id="resultado" class="result-card"></div>
    
    <a id="btn-whatsapp" href="#" class="btn-ws-pro" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="W">
      Consultar Validación con el Dr. Anzorena
    </a>
  </div>

  <footer class="footer-sig">
    Desarrollado por el Dr. Sergio Anzorena · Tecnología & Derecho
  </footer>
</div>

<script>
let JUS = 665078.59;
const CASOS = {
  general: [{ id:"gen_ord", label:"Ordinario Art. 2", tipo:"escala", factor:1 }, { id:"gen_suc", label:"Sucesión Art. 8", tipo:"escala", factor:0.70 }],
  familia: [{ id:"fam_ali", label:"Alimentos (24 cuotas)", tipo:"alimentos" }, { id:"fam_div", label:"Divorcio (Mínimo)", tipo:"jus_fijo", jus:3 }],
  desalojo: [{ id:"des_fal", label:"Desalojo Falta de Pago", tipo:"desalojo" }],
  penal: [{ id:"pen_cri", label:"Proceso Criminal", tipo:"jus_fijo", jus:5 }],
  extra: [{ id:"ext_car", label:"Carta Documento", tipo:"jus_fijo", jus:0.5 }]
};

function fmtPesos(n) { return new Intl.NumberFormat("es-AR", { style:"currency", currency:"ARS", maximumFractionDigits:0 }).format(n); }
function formatInput(el) { let v = el.value.replace(/[^\d]/g,""); if (v) el.value = new Intl.NumberFormat("es-AR").format(parseInt(v)); }
function parseMonto(str) { return parseFloat((str || "").replace(/\./g,"").replace(",",".")) || 0; }

function onCategoriaChange() {
  const cat = document.getElementById("categoria").value;
  const casoSel = document.getElementById("caso");
  document.getElementById("caso-field").classList.toggle("hidden", !cat);
  if (!cat) return;
  casoSel.innerHTML = '<option value="">Seleccioná...</option>';
  (CASOS[cat] || []).forEach(c => {
    const o = document.createElement("option"); o.value = c.id; o.textContent = c.label; casoSel.appendChild(o);
  });
}

function onCasoChange() {
  const id = document.getElementById("caso").value;
  document.getElementById("inputs-section").classList.toggle("hidden", !id);
  const cat = document.getElementById("categoria").value;
  const caso = (CASOS[cat] || []).find(c => c.id === id);
  document.getElementById("monto-field").classList.toggle("hidden", !(caso.tipo === "escala" || caso.tipo === "desalojo"));
  document.getElementById("cuota-field").classList.toggle("hidden", !(caso.tipo === "alimentos" || caso.tipo === "desalojo"));
}

function calcular() {
  const cat = document.getElementById("categoria").value;
  const id = document.getElementById("caso").value;
  const caso = (CASOS[cat] || []).find(c => c.id === id);
  const m = parseMonto(document.getElementById("monto").value);
  const c = parseMonto(document.getElementById("cuota").value);
  
  let totalJus = 0;
  if (caso.tipo === "jus_fijo") totalJus = caso.jus;
  else if (caso.tipo === "escala") totalJus = (m / JUS) * 0.12 * caso.factor;
  else if (caso.tipo === "alimentos") totalJus = ((c * 24) / JUS) * 0.12;
  else if (caso.tipo === "desalojo") totalJus = (Math.max(m, c*24) / JUS) * 0.12;

  if (document.getElementById("complejidad").checked) totalJus *= 1.3;
  if (document.getElementById("perdedor").checked) totalJus *= 0.7;

  const totalPesos = totalJus * JUS;
  document.getElementById("resultado").innerHTML = `
    <div style="font-size:9px; color:var(--green); letter-spacing:2px; text-transform:uppercase">Honorario Estimado</div>
    <div class="result-amount">${fmtPesos(totalPesos)}</div>
    <div style="color:var(--green); opacity:0.7; font-size:14px">${totalJus.toFixed(2)} JUS</div>
  `;
  document.getElementById("resultado-container").classList.remove("hidden");

  // Configurar WhatsApp
  const msg = encodeURIComponent(`Hola Dr. Sergio Anzorena, realicé un cálculo para un proceso de ${caso.label}. El monto estimado es de ${fmtPesos(totalPesos)} (${totalJus.toFixed(2)} JUS). Me interesa una validación profesional.`);
  document.getElementById("btn-whatsapp").href = `https://wa.me/5492615703374?text=${msg}`;
}

function editJus() { document.getElementById("jus-display").style.display = "none"; document.getElementById("jus-input").style.display = "block"; document.getElementById("jus-input").focus(); }
function saveJus() { const v = parseFloat(document.getElementById("jus-input").value); if (v > 1000) JUS = v; document.getElementById("jus-text").textContent = fmtPesos(JUS); document.getElementById("jus-input").style.display = "none"; document.getElementById("jus-display").style.display = "flex"; }
</script>
</body>
</html>
